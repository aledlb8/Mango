name: Load Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Bootstrap
        run: bun run bootstrap

      - name: Load Test
        run: bun run test:load
